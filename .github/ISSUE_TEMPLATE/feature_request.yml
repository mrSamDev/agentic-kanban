name: Feature request
description: Suggest an idea for this project
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the use case.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen? Be specific about CLI commands, flags, or workflow changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you considered?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to submit a PR for this
        - label: This changes the kanban protocol (task states, hooks, or skills)
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links to related issues, prior art, ROADMAP items, etc.